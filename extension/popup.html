<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Whisper Dictate</title>
<style>
  body { font-family: sans-serif; font-size: 13px; width: 220px; padding: 12px; margin: 0; }
  h3 { margin: 0 0 8px; font-size: 14px; }
  .row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .green  { background: #2ecc71; }
  .red    { background: #e74c3c; }
  .gray   { background: #aaa; }
  #status { font-weight: bold; }
  #last   { font-size: 11px; color: #555; word-break: break-word; margin-top: 8px;
            max-height: 80px; overflow-y: auto; border-top: 1px solid #ddd; padding-top: 6px; }
  label   { font-size: 11px; color: #444; }
  input   { width: 56px; font-size: 12px; padding: 2px 4px; }
  button  { font-size: 11px; padding: 2px 8px; cursor: pointer; }
</style>
</head>
<body>
<h3>Whisper Dictate</h3>

<div class="row">
  <div class="dot" id="dot"></div>
  <span id="status">Checking…</span>
</div>

<div class="row">
  <label>Port:</label>
  <input type="number" id="port" min="1" max="65535" value="9754">
  <button id="save">Save</button>
</div>

<div id="last"></div>

<script>
const dot    = document.getElementById('dot');
const status = document.getElementById('status');
const portEl = document.getElementById('port');
const lastEl = document.getElementById('last');

let port = 9754;

chrome.storage.local.get(['port', 'lastText'], (res) => {
  if (res.port) { port = res.port; portEl.value = port; }
  if (res.lastText) lastEl.textContent = res.lastText;
  checkServer();
});

document.getElementById('save').addEventListener('click', () => {
  port = parseInt(portEl.value, 10) || 9754;
  chrome.storage.local.set({ port });
  checkServer();
});

async function checkServer() {
  try {
    const resp = await fetch(`http://localhost:${port}/pending`,
      { signal: AbortSignal.timeout(500) });
    if (resp.ok) {
      dot.className = 'dot green';
      status.textContent = 'Connected';
      return;
    }
  } catch {}
  dot.className = 'dot red';
  status.textContent = 'Server not running';
}

// Refresh status every 2s while popup is open
setInterval(checkServer, 2000);

// Listen for lastText updates from background
chrome.storage.onChanged.addListener((changes) => {
  if (changes.lastText) lastEl.textContent = changes.lastText.newValue;
});
</script>
</body>
</html>
